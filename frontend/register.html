<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Secure Auth System | Register
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="logo">
                🛡️
            </div>

            <h2>
                Create Account
            </h2>

            <p class="subtitle">
                Secure Authentication System
            </p>

            <input
                type="text"
                id="username"
                placeholder="Enter Username"
                autocomplete="username">

            <input
                type="email"
                id="email"
                placeholder="Enter Email Address"
                autocomplete="email">

            <input
                type="password"
                id="password"
                placeholder="Create Password"
                autocomplete="new-password">

            <button
                id="registerBtn"
                type="button"
                onclick="register()">

                Create Account

            </button>

            <p class="mt-3">

                Already have an account?

                <a href="index.html">
                    Login Here
                </a>

            </p>

        </div>

    </div>

    <script src="js/register.js"></script>

</body>

</html>
