<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Reset Password
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="success-icon">
🔒
</div>

<h2>
Create New Password
</h2>

<p>
Enter your new password.
</p>

<input
type="password"
id="password"
placeholder="New Password">

<div
id="strengthText"
style="
margin-bottom:10px;
font-weight:bold;
">
</div>

<button
onclick="resetPassword()">

Update Password

</button>

<div id="message">
</div>

</div>

</div>

<script src="js/reset-password.js"></script>

</body>

</html>
