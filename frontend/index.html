<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Secure Authentication System
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="success-icon">
            🔐
        </div>

        <h2>
            Welcome Back
        </h2>

        <p class="subtitle">
            Sign in to access your secure account
        </p>

        <input
            type="email"
            id="email"
            placeholder="Enter Email Address"
            autocomplete="email">

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            autocomplete="current-password">

        <button
            id="loginBtn"
            onclick="login()">

            Login

        </button>

        <div
            id="message"
            style="
            margin-top:15px;
            font-weight:bold;
            ">
        </div>

        <p
            style="
            margin-top:20px;
            ">

            <a href="forgot-password.html">

                Forgot Password?

            </a>

        </p>

        <p>

            Don't have an account?

            <a href="register.html">

                Register

            </a>

        </p>

    </div>

</div>

<script>

window.onload = function () {

    const params =
        new URLSearchParams(
            window.location.search
        );

    const email =
        params.get("email");

    if (email) {

        document.getElementById(
            "email"
        ).value = email;
    }
};

</script>

<script src="js/login.js"></script>

</body>

</html>
