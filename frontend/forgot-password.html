<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Forgot Password
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="success-icon">
🔑
</div>

<h2>
Forgot Password
</h2>

<p>
Enter your registered email
to receive a password reset link.
</p>

<input
type="email"
id="email"
placeholder="Enter Email">

<button
id="forgotBtn"
onclick="sendResetLink()">

Send Reset Link

</button>

<p>

<a href="index.html">

Back To Login

</a>

</p>

<div id="message">
</div>

</div>

</div>

<script src="js/forgot-password.js"></script>

</body>

</html>
